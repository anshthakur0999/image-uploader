apiVersion: v1
kind: Namespace
metadata:
  name: image-uploader
  labels:
    name: image-uploader
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: image-uploader
type: Opaque
data:
  # Base64 encoded AWS credentials
  # Run: echo -n 'your_access_key_id' | base64
  # Run: echo -n 'your_secret_access_key' | base64
  access-key-id: eW91cl9hY2Nlc3Nfa2V5X2lkX2hlcmU=  # Replace with actual base64 encoded value
  secret-access-key: eW91cl9zZWNyZXRfYWNjZXNzX2tleV9oZXJl  # Replace with actual base64 encoded value
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: image-uploader
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  AWS_REGION: "us-east-1"
  STORAGE_TYPE: "s3"
  AWS_S3_BUCKET_NAME: "your-image-upload-bucket"  # Replace with your actual bucket name