apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: image-uploader-ingress
  namespace: image-uploader
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"  # Allow larger file uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Optional: Enable SSL/TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: image-uploader.your-domain.com  # Replace with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: image-uploader-service
            port:
              number: 80
  # Optional: TLS configuration
  # tls:
  # - hosts:
  #   - image-uploader.your-domain.com
  #   secretName: image-uploader-tls